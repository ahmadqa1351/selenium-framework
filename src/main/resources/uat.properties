# ============================================================
# UAT ENVIRONMENT CONFIGURATION
# Active when: -Denv=uat
# ============================================================

env=uat

base.url=https://app-uat.company.com
api.base.url=https://api-uat.company.com/v1

admin.username=uat-admin@company.com
admin.password=UatAdmin@2024!
test.username=uat-tester@company.com
test.password=UatTest@2024!

api.key=uat-api-key-placeholder

# UAT DB — read-only validation only
db.url=jdbc:mysql://uat-db.company.com:3306/app_uat?useSSL=true&serverTimezone=UTC
db.username=uat_readonly
db.password=uat_db_password

explicit.wait.seconds=20
page.load.timeout.seconds=45

# Retry more aggressively in UAT — shared environment, more flakiness
retry.count=2

screenshot.on.pass=false

# Run smoke suite only in UAT by default (full regression is too risky)
# Override with -DsuiteXmlFile=testng-regression.xml if needed
