# ============================================================
# BASE CONFIGURATION — shared defaults for all environments
# Values here are overridden by {env}.properties files and
# then by JVM system properties (-Dkey=value from CLI/CI).
# ============================================================

# ── Active environment (overridden by -Denv=qa) ──────────────
env=qa

# ── Browser (overridden by -Dbrowser=firefox) ────────────────
browser=chrome

# ── WebDriver timeouts (seconds) ─────────────────────────────
implicit.wait.seconds=0
explicit.wait.seconds=15
page.load.timeout.seconds=30
script.timeout.seconds=30

# ── Selenium Grid / Remote execution ─────────────────────────
# Leave blank for local execution. Set to Grid hub URL for remote.
# Example: grid.url=http://selenium-hub:4444/wd/hub
grid.url=

# ── Retry mechanism ──────────────────────────────────────────
# Number of retries on test failure. 0 = no retries.
retry.count=1

# ── Reporting ─────────────────────────────────────────────────
report.dir=reports
screenshot.on.pass=false

# ── API (base value; override per environment) ────────────────
api.key=

# ── Database (disabled by default; enable per environment) ───
db.driver=com.mysql.cj.jdbc.Driver
db.url=
db.username=
db.password=
