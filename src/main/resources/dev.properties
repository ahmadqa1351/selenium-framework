# ============================================================
# DEV ENVIRONMENT CONFIGURATION
# Active when: -Denv=dev
# ============================================================

env=dev

# Application URL
base.url=http://localhost:8080
api.base.url=http://localhost:8080/api/v1

# Credentials — use test accounts only, never real credentials in version control
admin.username=admin@dev.local
admin.password=DevAdmin@123
test.username=testuser@dev.local
test.password=DevTest@123

# API
api.key=dev-api-key-placeholder

# Database — local dev database
db.url=jdbc:mysql://localhost:3306/app_dev?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
db.username=dev_user
db.password=dev_password

# Timeouts — more lenient in dev (slower local environment)
explicit.wait.seconds=20
page.load.timeout.seconds=45

# Retry — no retries in dev for faster feedback
retry.count=0

# Show screenshots on pass in dev for visual verification
screenshot.on.pass=true
