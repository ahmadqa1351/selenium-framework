# ============================================================
# QA ENVIRONMENT CONFIGURATION
# Active when: -Denv=qa  (default)
# ============================================================

env=qa

# Application URL
base.url=https://app-qa.company.com
api.base.url=https://api-qa.company.com/v1

# Credentials — QA test accounts
admin.username=qa-admin@company.com
admin.password=QaAdmin@2024!
test.username=qa-user@company.com
test.password=QaUser@2024!

# API
api.key=qa-api-key-placeholder

# Database — QA database (read-only for validation)
db.url=jdbc:mysql://qa-db.company.com:3306/app_qa?useSSL=true&serverTimezone=UTC
db.username=qa_readonly
db.password=qa_db_password

# Timeouts
explicit.wait.seconds=15
page.load.timeout.seconds=30

# Retry — 1 retry in QA to guard against environment flakiness
retry.count=1

screenshot.on.pass=false
