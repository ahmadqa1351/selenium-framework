# ============================================================
# Docker Compose — Selenium Grid 4 + Framework
#
# Services:
#   selenium-hub     → Grid hub (routes test sessions to nodes)
#   chrome           → Chrome node (scale with --scale chrome=N)
#   firefox          → Firefox node
#   framework-runner → The test framework execution container
#
# Start Grid only (for local parallel execution):
#   docker-compose up -d selenium-hub chrome firefox
#
# Run smoke tests against the Grid:
#   docker-compose run --rm framework-runner
#
# Scale Chrome nodes for heavy parallel load:
#   docker-compose up -d --scale chrome=4 --scale firefox=2
#
# View Grid console: http://localhost:4444
# ============================================================

version: '3.8'

services:

  # ── Selenium Grid Hub ──────────────────────────────────────
  selenium-hub:
    image: selenium/hub:4.20.0
    container_name: selenium-hub
    ports:
      - "4444:4444"   # Grid console + WebDriver endpoint
      - "4442:4442"   # Event bus publish
      - "4443:4443"   # Event bus subscribe
    environment:
      SE_NODE_MAX_SESSIONS: 5
      SE_SESSION_REQUEST_TIMEOUT: 300
      SE_SESSION_RETRY_INTERVAL: 5
    networks:
      - selenium-grid
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:4444/wd/hub/status" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 15s

  # ── Chrome Node ────────────────────────────────────────────
  chrome:
    image: selenium/node-chrome:4.20.0
    container_name: selenium-chrome
    shm_size: '2gb'    # Prevents Chrome from crashing due to /dev/shm exhaustion
    depends_on:
      selenium-hub:
        condition: service_healthy
    environment:
      SE_EVENT_BUS_HOST: selenium-hub
      SE_EVENT_BUS_PUBLISH_PORT: 4442
      SE_EVENT_BUS_SUBSCRIBE_PORT: 4443
      SE_NODE_MAX_SESSIONS: 3
      SE_NODE_OVERRIDE_MAX_SESSIONS: "true"
      SE_VNC_NO_PASSWORD: 1
    volumes:
      - /dev/shm:/dev/shm
    networks:
      - selenium-grid
    deploy:
      replicas: 2    # Start with 2 Chrome nodes; scale up as needed

  # ── Firefox Node ───────────────────────────────────────────
  firefox:
    image: selenium/node-firefox:4.20.0
    container_name: selenium-firefox
    shm_size: '2gb'
    depends_on:
      selenium-hub:
        condition: service_healthy
    environment:
      SE_EVENT_BUS_HOST: selenium-hub
      SE_EVENT_BUS_PUBLISH_PORT: 4442
      SE_EVENT_BUS_SUBSCRIBE_PORT: 4443
      SE_NODE_MAX_SESSIONS: 3
      SE_NODE_OVERRIDE_MAX_SESSIONS: "true"
    networks:
      - selenium-grid

  # ── Edge Node ──────────────────────────────────────────────
  edge:
    image: selenium/node-edge:4.20.0
    container_name: selenium-edge
    shm_size: '2gb'
    depends_on:
      selenium-hub:
        condition: service_healthy
    environment:
      SE_EVENT_BUS_HOST: selenium-hub
      SE_EVENT_BUS_PUBLISH_PORT: 4442
      SE_EVENT_BUS_SUBSCRIBE_PORT: 4443
      SE_NODE_MAX_SESSIONS: 2
    networks:
      - selenium-grid

  # ── Framework Runner ────────────────────────────────────────
  framework-runner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: framework-runner
    depends_on:
      selenium-hub:
        condition: service_healthy
    environment:
      ENV:            ${ENV:-qa}
      BROWSER:        ${BROWSER:-chrome}
      SUITE:          ${SUITE:-smoke}
      THREAD_COUNT:   ${THREAD_COUNT:-4}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      API_KEY:        ${API_KEY}
      # Point to the Grid hub
      GRID_URL:       http://selenium-hub:4444/wd/hub
    volumes:
      # Mount reports directory to retrieve artifacts from the host
      - ./reports:/app/reports
    networks:
      - selenium-grid
    profiles:
      # Only started with: docker-compose --profile run up framework-runner
      - run

  # ── Selenium Grid VNC viewer (optional — for visual debugging) ──
  # Access via VNC client at localhost:5900 (password: secret)
  selenium-hub-video:
    image: selenium/video:ffmpeg-6.1.1-20240621
    depends_on:
      - selenium-hub
    environment:
      DISPLAY_CONTAINER_NAME: selenium-hub
      FILE_NAME: grid_session_recording.mp4
    volumes:
      - ./reports/videos:/videos
    networks:
      - selenium-grid
    profiles:
      - video

networks:
  selenium-grid:
    driver: bridge

volumes:
  reports:
    driver: local
