# ============================================================
# Enterprise Selenium Framework — GitHub Actions CI Pipeline
#
# Workflow jobs:
#   smoke      → runs on every push and PR (fast gate, ~5 min)
#   regression → runs nightly on main, or manually triggered
#   cross-browser → matrix job: chrome + firefox + edge
#
# Secrets required (set in repo Settings → Secrets):
#   QA_ADMIN_PASSWORD, QA_DB_PASSWORD, QA_API_KEY
# ============================================================

name: Selenium Framework CI

on:
  push:
    branches: [ main, develop, 'release/**' ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Nightly regression at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      suite:
        description: 'TestNG suite to run'
        required: true
        default: 'smoke'
        type: choice
        options: [ smoke, regression, parallel ]
      environment:
        description: 'Target environment'
        required: true
        default: 'qa'
        type: choice
        options: [ dev, qa, uat ]
      browser:
        description: 'Browser'
        required: true
        default: 'chrome_headless'
        type: choice
        options: [ chrome_headless, firefox_headless, edge_headless ]

# Cancel in-progress runs on new push to same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '17'
  MAVEN_OPTS: '-Xmx2048m -XX:+UseG1GC'

jobs:

  # ── Job 1: Build & Compile ────────────────────────────────
  build:
    name: Build & Compile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Compile framework
        run: mvn clean compile test-compile -q

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

  # ── Job 2: Smoke Tests (CI gate) ──────────────────────────
  smoke:
    name: Smoke Tests (${{ github.event.inputs.environment || 'qa' }})
    needs: build
    runs-on: ubuntu-latest
    env:
      ENV: ${{ github.event.inputs.environment || 'qa' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Run Smoke Tests
        run: |
          mvn test \
            -P smoke \
            -Denv=${{ env.ENV }} \
            -Dbrowser=chrome_headless \
            -Dadmin.password=${{ secrets.QA_ADMIN_PASSWORD }} \
            -Dapi.key=${{ secrets.QA_API_KEY }} \
            -q
        continue-on-error: false

      - name: Upload Extent Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report-${{ github.run_number }}
          path: reports/
          retention-days: 14

      - name: Upload Screenshots on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-screenshots-${{ github.run_number }}
          path: reports/screenshots/
          retention-days: 7

      - name: Publish Test Results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Smoke Test Results
          path: target/surefire-reports/**/*.xml
          reporter: java-junit
          fail-on-error: false

  # ── Job 3: Regression Tests (nightly + manual) ─────────────
  regression:
    name: Regression Tests
    needs: smoke
    # Run on schedule (nightly), manual trigger, or when workflow_dispatch specifies regression
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.suite != 'smoke')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Run Regression Suite (parallel)
        run: |
          mvn test \
            -P ${{ github.event.inputs.suite || 'regression' }} \
            -Denv=${{ github.event.inputs.environment || 'qa' }} \
            -Dbrowser=${{ github.event.inputs.browser || 'chrome_headless' }} \
            -Dparallel.thread.count=4 \
            -Dadmin.password=${{ secrets.QA_ADMIN_PASSWORD }} \
            -Ddb.password=${{ secrets.QA_DB_PASSWORD }} \
            -Dapi.key=${{ secrets.QA_API_KEY }} \
            -q

      - name: Upload Regression Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-report-${{ github.run_number }}
          path: reports/
          retention-days: 30

      - name: Publish Regression Results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Regression Test Results
          path: target/surefire-reports/**/*.xml
          reporter: java-junit

  # ── Job 4: Cross-Browser Matrix ────────────────────────────
  cross-browser:
    name: Cross-Browser — ${{ matrix.browser }}
    needs: smoke
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false   # Continue other browsers even if one fails
      matrix:
        browser: [ chrome_headless, firefox_headless ]
        include:
          - browser: chrome_headless
            install-action: browser-actions/setup-chrome@v1
          - browser: firefox_headless
            install-action: browser-actions/setup-firefox@v3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Install ${{ matrix.browser }}
        uses: ${{ matrix.install-action }}

      - name: Run Smoke Suite on ${{ matrix.browser }}
        run: |
          mvn test \
            -P smoke \
            -Denv=qa \
            -Dbrowser=${{ matrix.browser }} \
            -Dadmin.password=${{ secrets.QA_ADMIN_PASSWORD }} \
            -Dapi.key=${{ secrets.QA_API_KEY }} \
            -q

      - name: Upload ${{ matrix.browser }} Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cross-browser-${{ matrix.browser }}-${{ github.run_number }}
          path: reports/
          retention-days: 14
